<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart — DineFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- NAVIGATION -->
  <nav class="nav" id="main-nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Dine<span>Flow</span></a>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="index.html#restaurants-section">Restaurants</a></li>
      </ul>
      <div class="nav-right">
        <a href="cart.html" class="nav-cart">
          🛒&nbsp;Cart
          <span class="cart-badge" id="cart-badge">0</span>
        </a>
        <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <div class="page-wrap">
    <div class="cart-page-inner">
      <a href="index.html" class="back-link">← Continue Shopping</a>
      <h1 class="cart-page-title">Your Cart</h1>

      <div class="cart-layout" id="cart-layout-wrap">
        <!-- Cart items column -->
        <div id="cart-container">
          <!-- Rendered by JS -->
        </div>

        <!-- Summary column -->
        <div id="cart-summary" class="cart-summary-card" style="display:none;">
          <h3>Order Summary</h3>
          <div class="summary-row">
            <span>Subtotal</span>
            <span id="subtotal">$0.00</span>
          </div>
          <div class="summary-row">
            <span>Delivery</span>
            <span id="delivery-cost">—</span>
          </div>
          <div class="summary-row total">
            <span>Total</span>
            <span id="final-total">$0.00</span>
          </div>
          <a href="checkout.html" class="btn-apple btn-full" style="margin-top:20px;">
            Checkout →
          </a>
          <p style="font-size:12px; color: var(--secondary-text); text-align:center; margin-top:12px;">
            🔒 Secure, encrypted checkout
          </p>
        </div>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <p>© 2024 DineFlow. Crafted with care.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
  <script>
    window.addEventListener('scroll', () => {
      document.getElementById('main-nav').classList.toggle('scrolled', window.scrollY > 10);
    });
    document.getElementById('nav-toggle').addEventListener('click', () => {
      document.getElementById('nav-links').classList.toggle('mobile-open');
    });
  </script>

</body>
</html>
