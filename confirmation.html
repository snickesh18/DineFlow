<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed — DineFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .pulse-ring {
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      border: 2px solid rgba(52,199,89,0.4);
      animation: pulseRing 1.8s ease-out infinite;
    }
    @keyframes pulseRing {
      0% { transform: scale(0.9); opacity: 1; }
      100% { transform: scale(1.5); opacity: 0; }
    }
    .confirm-icon-wrap {
      position: relative;
      width: 80px; height: 80px;
      margin: 0 auto 28px;
    }
    .steps {
      display: flex;
      justify-content: center;
      gap: 0;
      margin: 28px 0;
    }
    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex: 1;
      max-width: 110px;
    }
    .step-dot {
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
    }
    .step-line {
      flex: 1;
      height: 2px;
      background: var(--accent);
      align-self: center;
      min-width: 24px;
    }
    .step-label {
      font-size: 11px;
      color: var(--secondary-text);
      text-align: center;
    }
    .confetti-bar {
      height: 4px;
      background: linear-gradient(90deg, #0071e3, #34C759, #FF9F0A, #FF3B30, #AF52DE, #0071e3);
      background-size: 200%;
      animation: shimmer 3s linear infinite;
      border-radius: 100px;
      margin-bottom: 32px;
    }
    @keyframes shimmer {
      0% { background-position: 0%; }
      100% { background-position: 200%; }
    }
    .order-id {
      font-size: 13px;
      color: var(--secondary-text);
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>

  <!-- NAVIGATION -->
  <nav class="nav" id="main-nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Dine<span>Flow</span></a>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="index.html#restaurants-section">Restaurants</a></li>
      </ul>
      <div class="nav-right">
        <a href="cart.html" class="nav-cart">
          🛒&nbsp;Cart
          <span class="cart-badge" id="cart-badge">0</span>
        </a>
        <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <div class="page-wrap confirm-page">
    <div class="confirm-card">

      <div class="confetti-bar"></div>

      <div class="confirm-icon-wrap">
        <div class="pulse-ring"></div>
        <div class="confirm-icon" style="position:relative; width:80px; height:80px; margin:0;">✓</div>
      </div>

      <p class="order-id" id="order-id"></p>
      <h1 class="confirm-title">Order Confirmed!</h1>
      <p class="confirm-subtitle">Your order has been placed successfully and is being prepared with care. Get ready for something delicious.</p>

      <div class="confirm-eta">
        <strong id="eta-time">35–45 min</strong>
        Estimated delivery time
      </div>

      <!-- Progress steps -->
      <div style="display:flex; align-items:center; justify-content:center; gap:0; margin-bottom:32px;">
        <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
          <div style="width:10px; height:10px; background:var(--accent); border-radius:50%;"></div>
          <span style="font-size:11px; color:var(--secondary-text);">Confirmed</span>
        </div>
        <div style="flex:1; height:2px; background:linear-gradient(90deg,var(--accent),var(--accent)); min-width:32px; margin-bottom:14px;"></div>
        <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
          <div style="width:10px; height:10px; background:var(--accent); border-radius:50%; animation: pulse-dot 1.5s ease-in-out infinite;"></div>
          <span style="font-size:11px; color:var(--secondary-text);">Preparing</span>
        </div>
        <div style="flex:1; height:2px; background:var(--border); min-width:32px; margin-bottom:14px;"></div>
        <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
          <div style="width:10px; height:10px; background:var(--border); border-radius:50%;"></div>
          <span style="font-size:11px; color:var(--secondary-text);">On its way</span>
        </div>
        <div style="flex:1; height:2px; background:var(--border); min-width:32px; margin-bottom:14px;"></div>
        <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
          <div style="width:10px; height:10px; background:var(--border); border-radius:50%;"></div>
          <span style="font-size:11px; color:var(--secondary-text);">Delivered</span>
        </div>
      </div>

      <a href="index.html" class="btn-apple btn-full">Order Again</a>

    </div>
  </div>

  <style>
    @keyframes pulse-dot {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.4); opacity: 0.6; }
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/cart.js"></script>
  <script>
    // Generate order ID
    const orderId = '#DF' + Math.random().toString(36).substring(2, 8).toUpperCase();
    document.getElementById('order-id').textContent = orderId;
    Cart.updateBadge();
  </script>

</body>
</html>
