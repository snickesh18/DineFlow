<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — DineFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- NAVIGATION -->
  <nav class="nav" id="main-nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Dine<span>Flow</span></a>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="index.html#restaurants-section">Restaurants</a></li>
      </ul>
      <div class="nav-right">
        <a href="cart.html" class="nav-cart">
          🛒&nbsp;Cart
          <span class="cart-badge" id="cart-badge">0</span>
        </a>
        <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <div class="page-wrap">
    <div class="checkout-inner">
      <a href="cart.html" class="back-link">← Back to Cart</a>
      <h1 class="checkout-title">Checkout</h1>

      <div class="checkout-grid">

        <!-- FORM -->
        <form id="checkout-form" novalidate>

          <!-- Delivery Info -->
          <div class="form-section" style="margin-bottom:20px;">
            <h3>📍 Delivery Details</h3>

            <div class="form-group">
              <label class="form-label" for="name">Full Name</label>
              <input type="text" id="name" class="form-control-apple" placeholder="Jane Smith" autocomplete="name">
              <p class="field-error" id="name-error"></p>
            </div>

            <div class="form-group">
              <label class="form-label" for="phone">Phone Number</label>
              <input type="tel" id="phone" class="form-control-apple" placeholder="+1 (555) 000-0000" autocomplete="tel">
              <p class="field-error" id="phone-error"></p>
            </div>

            <div class="form-group">
              <label class="form-label" for="address">Delivery Address</label>
              <textarea id="address" class="form-control-apple" placeholder="123 Main Street, Apt 4B, New York, NY 10001" autocomplete="street-address"></textarea>
              <p class="field-error" id="address-error"></p>
            </div>
          </div>

          <!-- Payment (UI only) -->
          <div class="form-section">
            <h3>💳 Payment</h3>
            <div class="form-group">
              <label class="form-label">Card Number</label>
              <input type="text" class="form-control-apple" placeholder="4242 4242 4242 4242" maxlength="19" oninput="formatCard(this)">
            </div>
            <div class="row g-3">
              <div class="col-6">
                <label class="form-label">Expiry</label>
                <input type="text" class="form-control-apple" placeholder="MM / YY" maxlength="7" oninput="formatExpiry(this)">
              </div>
              <div class="col-6">
                <label class="form-label">CVV</label>
                <input type="text" class="form-control-apple" placeholder="•••" maxlength="3">
              </div>
            </div>
            <p style="font-size:12px; color:var(--secondary-text); margin-top:12px; display:flex; align-items:center; gap:6px;">
              🔒 Your payment information is encrypted and secure.
            </p>
          </div>

          <button type="submit" class="btn-apple btn-full" style="margin-top:24px; padding:16px; font-size:17px;">
            Place Order →
          </button>
        </form>

        <!-- ORDER SUMMARY -->
        <div class="order-summary-card">
          <h3>Your Order</h3>
          <div id="order-summary-list">
            <!-- Populated by JS -->
          </div>
          <div class="order-total-row">
            <span>Total</span>
            <span id="checkout-total">$0.00</span>
          </div>
          <div style="margin-top:20px; padding:14px; background:rgba(0,113,227,0.06); border-radius:12px; font-size:13px; color:var(--secondary-text); line-height:1.6;">
            <strong style="color:var(--black); display:block; margin-bottom:4px;">Delivery estimate</strong>
            30–45 minutes after confirmation
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <p>© 2024 DineFlow. Crafted with care.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
  <script>
    window.addEventListener('scroll', () => {
      document.getElementById('main-nav').classList.toggle('scrolled', window.scrollY > 10);
    });
    document.getElementById('nav-toggle').addEventListener('click', () => {
      document.getElementById('nav-links').classList.toggle('mobile-open');
    });

    function formatCard(input) {
      let v = input.value.replace(/\D/g, '').substring(0, 16);
      input.value = v.replace(/(.{4})/g, '$1 ').trim();
    }
    function formatExpiry(input) {
      let v = input.value.replace(/\D/g, '').substring(0, 4);
      if (v.length >= 2) v = v.substring(0,2) + ' / ' + v.substring(2);
      input.value = v;
    }
  </script>

</body>
</html>
